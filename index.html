<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        .gif-container {
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            min-height: 35px;
        }

        /* စာသားကို ပိုမိုကြည့်ကောင်းအောင် Highlight ပြုလုပ်ထားသော ပုံစံအသစ် */
        .highlight-text {
            background-color: #ffebee;
            color: #d81b60;
            padding: 10px 15px;
            border-radius: 12px;
            display: inline-block;
            font-size: 20px;
            line-height: 1.5;
            font-weight: 600;
            border: 1px dashed #f48fb1;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.15);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 60px;
        }

        button {
            width: 130px;
            height: 55px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2px;
            line-height: 1.1;
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
        }

        .fade-heart {
            opacity: 0.4;
            font-size: 14px;
        }

        .floating-icon {
            position: absolute;
            font-size: 24px;
            animation: floatUp 2.5s linear forwards;
            opacity: 0;
            bottom: -20px;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-105vh) scale(1.3) rotate(180deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="gif-container">
            <img id="mainGif" src="https://www.image2url.com/r2/default/gifs/1782731656810-7f789d6c-e35f-4b49-b7d7-8a030bc22ea8.gif" alt="cute panda">
        </div>
        <h2 id="question"><span class="highlight-text">"ဘေဘီ" ‌ကိုယ့်တယောက်တည်းကို တကယ်ချစ်ပေးနိုင်မလား သေချာစဉ်းစားပြီးမှ ဖြေပေးနော်</span></h2>
        <div class="btn-container">
            <button id="yesBtn">YES <span>❤️</span></button>
            <button id="noBtn">No <span class="fade-heart">💔</span></button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const mainGif = document.getElementById('mainGif');

        const stages = [
            { text: "Are you sure? 🥺", gif: "https://www.image2url.com/r2/default/gifs/1782733627497-6259167d-150a-45e3-834d-eb46ed56b3f1.gif" },
            { text: "Think again please... 😭", gif: "https://www.image2url.com/r2/default/gifs/1782733511971-0c1b75fa-e205-442c-b3b9-49c11e5d491d.gif" },
            { text: "Don't do this to me 😢", gif: "https://www.image2url.com/r2/default/gifs/1782733733246-a7fe797d-44ec-42eb-bc2d-92eacb86e18b.gif" },
            { text: "You are breaking my heart... 💔", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdzB0YjRtOGt2ajdzbnp1eXpyczN5ajAwNHIwbzF0NmZ5ZHBrY2NvbSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/L95W4wv8nnb9K/giphy.gif" },
            { text: "Just say YES please! 🥺👉👈", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExODFrc250eDZ4ZnI4ZTRvMTFmZnZpOWY4enVncG1iNmNtMThncmphYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" }
        ];

        let currentStage = 0;
        let yesStage = 0; // YES အဆင့်ကို မှတ်ရန် variable
        let heartInterval;

        // ⚠️ --- သင့်ရဲ့ Telegram Bot အချက်အလက်များ ---
        const TELEGRAM_BOT_TOKEN = '8919393608:AAG9OcBJQlWUWwdym5K4gHjtX52zZNFeVrM'; 
        const TELEGRAM_CHAT_ID = '6465999759';

        function sendToTelegram(keyName) {
            const message = `အခု နှိပ်လိုက်တဲ့ ခလုတ်ကတော့: [ ${keyName} ] ဖြစ်ပါတယ်ဗျာ။`;
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}`;
            
            fetch(url).catch(err => console.log(err));
        }
        // ------------------------------------------------------------------

        // NO ကို နှိပ်လျှင် မူလအတိုင်း အလုပ်လုပ်စေခြင်း
        noBtn.addEventListener('click', () => {
            sendToTelegram("NO");

            mainGif.style.display = 'none'; 
            if (currentStage < stages.length) {
                question.innerHTML = stages[currentStage].text;
                mainGif.src = stages[currentStage].gif;
                currentStage++;
            } else {
                currentStage = 0;
                question.innerHTML = stages[currentStage].text;
                mainGif.src = stages[currentStage].gif;
                currentStage++;
            }
            
            mainGif.onload = function() { mainGif.style.display = 'block'; };
            setTimeout(() => { mainGif.style.display = 'block'; }, 100);

            for(let i=0; i<5; i++) {
                setTimeout(createBrokenHeart, i * 150);
            }
        });

        // YES ကို ၃ ခါနှိပ်မှ အောင်မြင်မည့်စနစ်
        yesBtn.addEventListener('click', () => {
            if (yesStage === 0) {
                // YES ပထမအကြိမ်နှိပ်လျှင်
                sendToTelegram("YES (အဆင့် ၁ - တကယ်သေချာစဉ်းစားပြီးပြီလား)");
                question.innerHTML = `<span class="highlight-text">‌သေချာစဉ်းစားပြီးပြီလား 🙂</span>`;
                yesStage++;
            } else if (yesStage === 1) {
                // YES ဒုတိယအကြိမ်နှိပ်လျှင်
                sendToTelegram("YES (အဆင့် ၂ - တကယ်သေချာပီနော်)");
                question.innerHTML = `<span class="highlight-text">တကယ်သေချာပြီနော် 🥰</span>`;
                yesStage++;
            } else {
                // YES တတိယအကြိမ်နှိပ်လျှင် (တကယ့် YES နေရာသို့ ရောက်ရှိခြင်း)
                sendToTelegram("YES (တကယ့် YES - အောင်မြင်သည်)");

                question.innerHTML = "တကယ်ကြီး လက်ခံပြီပေါ့နော် 🥰❤️";
                mainGif.src = "https://cdn.imageurlgenerator.com/uploads/4012f60d-4a33-4b2d-8aee-1b9b2872e1e1.gif";
                
                yesBtn.style.display = 'none';
                noBtn.style.display = 'none';

                heartInterval = setInterval(createFullHeart, 200);
            }
        });

        function createBrokenHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-icon');
            heart.innerHTML = '💔';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's'; 
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 2500);
        }

        function createFullHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-icon');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 1.5 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 3500);
        }
    </script>
</body>
</html>
