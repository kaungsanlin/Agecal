<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Login Box Style */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            padding: 20px;
            box-sizing: border-box;
        }
        .login-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-box h3 {
            margin-top: 0;
            color: #33;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .login-box p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .login-box input:focus {
            border-color: #007bff;
            outline: none;
        }
        .login-btn {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover { background: #0056b3; }

        /* Main App Container */
        .container {
            display: none; 
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            position: relative;
        }
        
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; color: #333; font-size: 22px; }
        
        .cal-toggle-btn {
            background: #f0f4f8; border: 1px solid #d0e1fd; border-radius: 8px; padding: 8px 12px; cursor: pointer;
            display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; color: #007bff; transition: all 0.2s;
        }
        .cal-toggle-btn:hover { background: #007bff; color: white; }

        .type-selector { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .radio-label { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: bold; color: #4a5568; cursor: pointer; }
        .radio-label input[type="radio"] { width: 18px; height: 18px; cursor: pointer; accent-color: #007bff; }

        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 15px; font-weight: bold; color: #666; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; margin-bottom: -2px; }
        .tab-btn.mm-active.active { color: #8c6239; border-bottom: 3px solid #8c6239; }
        .calculator-form { display: none; }
        .calculator-form.active { display: block; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #4a4a4a; }
        input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #ccd1d9; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        .calc-btn { width: 100%; color: white; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        #btn-en { background-color: #007bff; } #btn-en:hover { background-color: #0056b3; }
        #btn-mm { background-color: #8c6239; } #btn-mm:hover { background-color: #6f4e2d; }
        
        .footer-credit { margin-top: 25px; font-size: 14px; color: #888; letter-spacing: 0.5px; font-weight: 500; }

        /* CALENDAR MODAL */
        .calendar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 20000; padding: 10px; box-sizing: border-box; }
        .calendar-box { background: #222222; color: #ffffff; padding: 15px; border-radius: 12px; max-width: 440px; width: 100%; box-shadow: 0 5px 25px rgba(0,0,0,0.5); animation: fadeIn 0.2s ease-out; }
        .calendar-title-banner { background: #3a3a3a; padding: 12px; text-align: center; border-radius: 8px; margin-bottom: 10px; border: 1px solid #4a4a4a; }
        .cal-eng-title { font-size: 16px; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; }
        .cal-mm-title { font-size: 13px; color: #00fff0; margin-top: 5px; cursor: pointer; text-decoration: underline dashed; display: inline-block; padding: 2px 8px; border-radius: 4px; transition: background 0.2s; }
        .cal-mm-title:hover { background: #4e4e4e; }
        .mm-year-selector-wrap { display: none; margin-top: 5px; justify-content: center; align-items: center; gap: 8px; }
        .mm-year-selector-wrap select { background: #111; color: #00fff0; border: 1px solid #00fff0; padding: 5px; font-size: 13px; border-radius: 4px; width: auto; font-weight: bold; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: #2d2d2d; padding: 8px; border-radius: 8px; }
        .calendar-nav select { background: #444; color: #fff; border: 1px solid #555; padding: 6px; font-size: 14px; width: auto; display: inline-block; border-radius: 4px; }
        .nav-btn { background: #555; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .nav-btn:hover { background: #007bff; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; margin-bottom: 8px; color: #bbb; font-size: 12px; background: #2d2d2d; padding: 6px 0; border-radius: 4px; }
        .weekdays div:first-child { color: #ff4d4d; } .weekdays div:last-child { color: #ffad33; }  
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #444; border: 1px solid #444; border-radius: 6px; overflow: hidden; }
        .day-cell { background: #252525; padding: 8px 2px; cursor: pointer; min-height: 52px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.15s; }
        .day-cell:hover { background: #007bff !important; }
        .day-cell .eng-num { font-size: 15px; font-weight: bold; }
        .day-cell .mm-num { font-size: 10px; color: #aaa; margin-top: 3px; }
        .day-cell .mm-num.moon-up { color: #818cf8; } .day-cell .mm-num.moon-down { color: #fbbf24; } .day-cell .mm-num.moon-full { color: #f87171; font-weight: bold; } .day-cell .mm-num.moon-dark { color: #9ca3af; font-weight: bold; } 
        .day-cell:hover .mm-num { color: #fff !important; }
        .day-cell.empty { background: #1a1a1a; cursor: default; }
        .day-cell.today { background: #1e293b; box-shadow: inset 0 0 0 2px #007bff; }
        .day-cell.is-sun .eng-num { color: #ff4d4d; } .day-cell.is-sat .eng-num { color: #ffad33; }
        .close-popup-btn { width: 100%; background: #dc3545; color: white; border: none; padding: 11px; border-radius: 6px; margin-top: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }

        /* RESULT POPUP */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; box-sizing: border-box; }
        .modal-box { background: #fff; padding: 25px; border-radius: 12px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: fadeIn 0.2s ease-out; }
        .modal-box h3 { margin-top: 0; font-size: 20px; margin-bottom: 15px; }
        .status-pass { color: #28a745; } .status-fail { color: #dc3545; }
        .modal-box p { color: #333; font-size: 16px; line-height: 1.7; margin-bottom: 22px; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid #ddd; }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-yes { background-color: #28a745; color: white; } .btn-no { background-color: #6c757d; color: white; } .btn-ok { background-color: #007bff; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h3>Device Lock စနစ်</h3>
        <p id="lockInfoText">စစ်ဆေးနေပါသည်...</p>
        <input type="text" id="userPhoneNumber" placeholder="Activation Key ကို ရိုက်ထည့်ပါ" autocomplete="off">
        <button class="login-btn" onclick="validateAccess()">အကောင့်ဝင်မည်</button>
    </div>
</div>

<div class="container" id="mainAppContainer">
    <div class="header-area">
        <h2>Age Calculator</h2>
        <button class="cal-toggle-btn" onclick="toggleCalendar(true)">ပြက္ခဒိန်ကြည့်ရန်</button>
    </div>
    
    <div class="type-selector">
        <label class="radio-label"><input type="radio" name="appType" value="new" checked>အသစ် (၁၈ - ၆၂)</label>
        <label class="radio-label"><input type="radio" name="appType" value="old">အဟောင်း (၁၈ - ၇၀)</label>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('english-tab', this, false)">Eng ပြက္ခဒိန်</button>
        <button class="tab-btn" onclick="switchTab('myanmar-tab', this, true)">မြန်မာပြက္ခဒိန်</button>
    </div>

    <div id="english-tab" class="calculator-form active">
        <div class="form-group">
            <label for="enYear">မွေးသက္ကရာဇ်</label>
            <input type="number" id="enYear" placeholder="ဥပမာ - 1994" min="1" max="2100" required>
        </div>
        <div class="form-group">
            <label for="enMonth">မွေးလ</label>
            <select id="enMonth">
                <option value="1">ဇန်နဝါရီ (January)</option><option value="2">ဖေဖော်ဝါရီ (February)</option><option value="3">မတ် (March)</option><option value="4">ဧပြီ (April)</option><option value="5">မေ (May)</option><option value="6">ဇွန် (June)</option><option value="7">ဇူလိုင် (July)</option><option value="8">သြဂုတ် (August)</option><option value="9">စက်တင်ဘာ (September)</option><option value="10">အောက်တိုဘာ (October)</option><option value="11">နိုဝင်ဘာ (November)</option><option value="12">ဒီဇင်ဘာ (December)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="enDay">မွေးရက် (ရက်စွဲ) </label>
            <input type="number" id="enDay" placeholder="ဥပမာ - 9" min="1" max="31" required>
        </div>
        <button class="calc-btn" id="btn-en" onclick="calculateEnglishAge()">တွက်မည်</button>
    </div>

    <div id="myanmar-tab" class="calculator-form">
        <div class="form-group">
            <label for="mmYear">မွေးသက္ကရာဇ် </label>
            <input type="number" id="mmYear" placeholder="ဥပမာ - ၁၃၅၆" min="1" max="1600" required>
        </div>
        <div class="form-group">
            <label for="mmMonth">မွေးလ </label>
            <select id="mmMonth">
                <option value="1">တန်ခူး</option><option value="2">ကဆုန်</option><option value="3">နယုန်</option><option value="4">ဝါဆို</option><option value="5">ဝါခေါင်</option><option value="6">တော်သလင်း</option><option value="7">သီတင်းကျွတ်</option><option value="8">တန်ဆောင်မုန်း</option><option value="9">နတ်တော်</option><option value="10">ပြာသို</option><option value="11">တပို့တွဲ</option><option value="12">တပေါင်း</option>
            </select>
        </div>
        <div class="row">
            <div class="col"><div class="form-group"><label for="moonPhase">လဆန်း/လဆုတ် </label><select id="moonPhase"><option value="1">လဆန်း</option><option value="2">လဆုတ်</option></select></div></div>
            <div class="col"><div class="form-group"><label for="mmDay">ရက် (၁ မှ ၁၅) </label><input type="number" id="mmDay" min="1" max="15" value="1" required></div></div>
        </div>
        <button class="calc-btn" id="btn-mm" onclick="calculateMyanmarAge()">တွက်မည်</button>
    </div>
</div>

<div id="calendarModal" class="calendar-overlay">
    <div class="calendar-box">
        <div class="calendar-title-banner">
            <div id="calEngTitleText" class="cal-eng-title">JUNE 2026</div>
            <div id="calMmTitleText" class="cal-mm-title" onclick="toggleMmYearSelector(true)">မြန်မာ - သက္ကရာဇ်</div>
            <div id="mmYearSelectorWrap" class="mm-year-selector-wrap">
                <select id="calMmYearSelect" onchange="handleMmYearChange()"></select>
                <button class="nav-btn" style="padding: 3px 8px; font-size: 11px;" onclick="toggleMmYearSelector(false)">ပိတ်</button>
            </div>
        </div>
        <div class="calendar-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <div><select id="calYearSelect" onchange="updateCalendarView()"></select><select id="calMonthSelect" onchange="updateCalendarView()"></select></div>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="weekdays"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div>
        <div id="calendarDaysGrid" class="days-grid"></div>
        <button class="close-popup-btn" onclick="toggleCalendar(false)">ပိတ်မည်</button>
    </div>
</div>

<div id="ageModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <p id="modalText"></p>
        <div id="modalButtons" class="modal-buttons"></div>
    </div>
</div>

<div class="footer-credit">Modify by KSL</div>

<script>
    // ⚠️ အရေးကြီးဆုံးအဆင့် - Google Sheet ထဲက Apps Script ကရလာတဲ့ Web App URL ကို အောက်က မျက်တောင်ကွင်းထဲမှာ ထည့်ပေးပါဗျာ
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwYpZ7Xr3E_-0g0Ayn0TMpiSmKqRD_LfYXZzDsta6mDC3d2zn4J6a5Lb16IVd53j08qsQ/exec";

    const MCIX_PASSWORD = "P@ssw0rd";
    const CURRENT_VERSION = "1.2"; 
    const VERSION_CHECK_URL = "https://raw.githubusercontent.com/kaungsanlin/Age-Calculator-/main/version.json";

    let currentCalYear = 2026;
    let currentCalMonth = 5;

    const mmMonthsList = ["တန်ခူး", "ကဆုန်", "နယုန်", "ဝါဆို", "ဝါခေါင်", "တော်သလင်း", "သီတင်းကျွတ်", "တန်ဆောင်မုန်း", "နတ်တော်", "ပြာသို", "တပို့တွဲ", "တပေါင်း"];
    const engMonthsFull = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

    // ဖုန်းတစ်လုံးချင်းစီအတွက် မတူညီသော Device ID အလိုအလျောက် ထုတ်ပေးသည့်စနစ်
    function getDeviceID() {
        let deviceId = localStorage.getItem("ksl_device_id");
        if (!deviceId) {
           
            const rand = Math.floor(1000 + Math.random() * 9000);
            deviceId = "KSL-" + rand;
            localStorage.setItem("ksl_device_id", deviceId);
        }
        return deviceId;
    }

    // Google Sheet သို့ လှမ်းစစ်ပြီး တစ်ခါတည်း သိမ်းဆည်းမည့် စနစ်အသစ်
    function validateAccess() {
        const inputKey = document.getElementById('userPhoneNumber').value.trim();
        const currentDeviceId = getDeviceID();
        
        if (!inputKey) {
            alert("ကျေးဇူးပြု၍ Activation Key ရိုက်ထည့်ပေးပါဗျာ။");
            return;
        }

        if (WEB_APP_URL.includes("အစ်ကို့ရဲ့_Google_Apps_Script")) {
            alert("⚠️ သတိပေးချက်: ကုဒ်ထဲတွင် WEB_APP_URL ထည့်ရန် ကျန်နေပါသေးသည်ဗျာ။");
            return;
        }

        // Google Sheet Database စနစ်သို့ လှမ်းစစ်ခိုင်းခြင်း
        fetch(`${WEB_APP_URL}?key=${encodeURIComponent(inputKey)}&deviceId=${encodeURIComponent(currentDeviceId)}&action=check`)
        .then(res => res.json())
        .then(response => {
            if (response.status === "invalid") {
                alert("❌ ဤ Key သည် Register မလုပ်ရသေးပါ။");
            } 
            else if (response.status === "used") {
                alert("❌ ဤ Key သည် အခြားဖုန်းတစ်ခုတွင် အသုံးပြုပြီးဖြစ်သည်။");
            } 
            else if (response.status === "activated") {
                // ပထမဆုံးအကြိမ် Key အောင်မြင်စွာ တွဲဆက်ပြီး Lock ချည်လိုက်ချိန်
                localStorage.setItem("ksl_used_key", inputKey);
                localStorage.setItem("ksl_device_activated", "true");
                alert("Successfully");
                enterMainApp();
            } 
            else if (response.status === "matched") {
                // နောက်ပိုင်းရက်များတွင် ဒီဖုန်းကပဲ ပြန်ဖွင့်သည့်အခါ တိုက်ရိုက်ပေးဝင်ခြင်း
                localStorage.setItem("ksl_used_key", inputKey);
                localStorage.setItem("ksl_device_activated", "true");
                enterMainApp();
            }
        })
        .catch(err => {
            console.error(err);
            alert("အင်တာနက်လိုင်း မကောင်းပါ သို့မဟုတ် Apps Script URL မှားယွင်းနေပါသည်ဗျာ။");
        });
    }

    function enterMainApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainAppContainer').style.display = 'block';
        checkAppUpdate();
        initCalendarSelects();
    }

    // App စတင်ပွင့်လာချိန်တွင် စစ်ဆေးမှုများပြုလုပ်ခြင်း
    window.onload = function() {
        const currentDeviceId = getDeviceID();
        
        const infoPara = document.getElementById('lockInfoText');
        if (infoPara) {
            infoPara.innerHTML = `<b>Device ID: <span style="color:#28a745;">${currentDeviceId}</span></b><br>` +
                                 `<span style="color:#666; font-size:12px;">(ဤ Device ID အတွက် Approved Key တောင်းယူပါ)</span>`;
        }

        const isActivated = localStorage.getItem("ksl_device_activated");
        const usedKey = localStorage.getItem("ksl_used_key");
        
        // ယခင်က Key မှန်ကန်စွာရိုက်ဖူးရင် ဒေတာဘေ့စ်ဆီ တိုက်ရိုက်လှမ်းစစ်ပြီး ပေးဝင်မည်
        if (isActivated === "true" && usedKey) {
            fetch(`${WEB_APP_URL}?key=${encodeURIComponent(usedKey)}&deviceId=${encodeURIComponent(currentDeviceId)}&action=check`)
            .then(res => res.json())
            .then(response => {
                if (response.status === "matched" || response.status === "activated") {
                    enterMainApp();
                } else {
                    localStorage.removeItem("ksl_device_activated");
                    localStorage.removeItem("ksl_used_key");
                }
            })
            .catch(() => {
                // အင်တာနက်လိုင်းမရှိပါကလည်း ဝင်ဖူးပြီးသားမို့ Offline အနေနဲ့ ပေးဝင်ထားမည်
                enterMainApp();
            });
        }
    };

    document.getElementById('userPhoneNumber').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { validateAccess(); }
    });

    // Force Update စနစ်
    function checkAppUpdate() {
        if(!VERSION_CHECK_URL || VERSION_CHECK_URL.includes("your-username")) return;
        fetch(VERSION_CHECK_URL + "?v=" + new Date().getTime())
            .then(response => response.json())
            .then(data => { if (data.latestVersion !== CURRENT_VERSION) { showUpdateModal(data.message, data.updateUrl); } })
            .catch(error => console.log("Update check skipped:", error));
    }

    function showUpdateModal(message, updateUrl) {
        const modalHtml = `
            <div id="updateModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:99999; display:flex; justify-content:center; align-items:center; padding:20px; box-sizing:border-box;">
                <div style="background:#fff; padding:25px; border-radius:12px; max-width:400px; width:100%; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.3);">
                    <h3 style="color:#dc3545; margin-top:0; font-size:20px;">ဗားရှင်းအသစ်ထွက်ရှိနေပါသည်</h3>
                    <p style="color:#4a4a4a; line-height:1.6; text-align:left; font-size:15px; margin-bottom:25px;">${message}</p>
                    <a href="${updateUrl}" target="_blank" style="display:block; text-decoration:none; width:100%; background:#28a745; color:#fff; padding:12px 0; border-radius:6px; font-size:16px; font-weight:bold; text-align:center;">အပ်ဒိတ်လုပ်မည်</a>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    // ပြက္ခဒိန် အပိုင်း
    function initCalendarSelects() {
        const yearSelect = document.getElementById('calYearSelect');
        const monthSelect = document.getElementById('calMonthSelect');
        const mmYearSelect = document.getElementById('calMmYearSelect');
        yearSelect.innerHTML = ""; mmYearSelect.innerHTML = ""; monthSelect.innerHTML = "";
        for (let y = 1930; y <= 2045; y++) { let opt = document.createElement('option'); opt.value = y; opt.textContent = y; yearSelect.appendChild(opt); }
        for (let my = 1292; my <= 2407; my++) { let opt = document.createElement('option'); opt.value = my; opt.textContent = my + " ခု"; mmYearSelect.appendChild(opt); }
        const enMonths = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        enMonths.forEach((m, idx) => { let opt = document.createElement('option'); opt.value = idx; opt.textContent = m; monthSelect.appendChild(opt); });
        const today = new Date(); currentCalYear = today.getFullYear(); currentCalMonth = today.getMonth();
        yearSelect.value = currentCalYear; monthSelect.value = currentCalMonth;
    }

    function toggleCalendar(show) { document.getElementById('calendarModal').style.display = show ? 'flex' : 'none'; if (show) { toggleMmYearSelector(false); updateCalendarView(); } }
    function toggleMmYearSelector(show) {
        const textEl = document.getElementById('calMmTitleText'); const selectWrap = document.getElementById('mmYearSelectorWrap');
        if (show) { textEl.style.display = 'none'; selectWrap.style.display = 'flex'; let currentMmYear = currentCalYear - 638; if (currentCalMonth < 3) currentMmYear--; document.getElementById('calMmYearSelect').value = currentMmYear; } 
        else { textEl.style.display = 'inline-block'; selectWrap.style.display = 'none'; }
    }

    function handleMmYearChange() {
        const selectedMmYear = parseInt(document.getElementById('calMmYearSelect').value);
        let targetEngYear = selectedMmYear + 638; if (currentCalMonth < 3) { targetEngYear++; }
        currentCalYear = targetEngYear; document.getElementById('calYearSelect').value = currentCalYear;
        toggleMmYearSelector(false); updateCalendarView();
    }

    function changeMonth(direction) {
        currentCalMonth += direction;
        if (currentCalMonth > 11) { currentCalMonth = 0; currentCalYear++; } else if (currentCalMonth < 0) { currentCalMonth = 11; currentCalYear--; }
        document.getElementById('calYearSelect').value = currentCalYear; document.getElementById('calMonthSelect').value = currentCalMonth;
        toggleMmYearSelector(false); updateCalendarView();
    }

    function updateCalendarView() {
        currentCalYear = parseInt(document.getElementById('calYearSelect').value); currentCalMonth = parseInt(document.getElementById('calMonthSelect').value);
        const grid = document.getElementById('calendarDaysGrid'); grid.innerHTML = '';
        document.getElementById('calEngTitleText').textContent = `${engMonthsFull[currentCalMonth]} ${currentCalYear}`;
        let estimatedMmYear = currentCalYear - 638; if (currentCalMonth < 3) { estimatedMmYear--; }
        let currentMmMonthIdx = currentCalMonth; let nextMmMonthIdx = (currentCalMonth + 1) % 12;
        document.getElementById('calMmTitleText').textContent = `${estimatedMmYear} ခု ${mmMonthsList[currentMmMonthIdx]} - ${mmMonthsList[nextMmMonthIdx]}`;
        const firstDayIndex = new Date(currentCalYear, currentCalMonth, 1).getDay(); const totalDays = new Date(currentCalYear, currentCalMonth + 1, 0).getDate(); const todayDate = new Date();
        for (let i = 0; i < firstDayIndex; i++) { let emptyCell = document.createElement('div'); emptyCell.className = 'day-cell empty'; grid.appendChild(emptyCell); }
        for (let day = 1; day <= totalDays; day++) {
            let cell = document.createElement('div'); cell.className = 'day-cell';
            let currentDayOfWeek = new Date(currentCalYear, currentCalMonth, day).getDay();
            if (currentDayOfWeek === 0) cell.classList.add('is-sun'); if (currentDayOfWeek === 6) cell.classList.add('is-sat');
            if (currentCalYear === todayDate.getFullYear() && currentCalMonth === todayDate.getMonth() && day === todayDate.getDate()) { cell.classList.add('today'); }
            let mmDayNum = day % 15; if (mmDayNum === 0) mmDayNum = 15;
            let phaseClass = "", phaseText = "";
            if (day === 15) { phaseText = "လပြည့်"; phaseClass = "moon-full"; } 
            else if (day === totalDays || (totalDays === 30 && day === 30) || (totalDays === 29 && day === 29)) { phaseText = "လကွယ်"; phaseClass = "moon-dark"; } 
            else if (day < 15) { phaseText = `လဆန်း ${mmDayNum}`; phaseClass = "moon-up"; } 
            else { phaseText = `လဆုတ် ${mmDayNum}`; phaseClass = "moon-down"; }
            cell.innerHTML = `<div class="eng-num">${day}</div><div class="mm-num ${phaseClass}">${phaseText}</div>`;
            cell.onclick = () => {
                toggleCalendar(false); 
                document.getElementById('enYear').value = currentCalYear; 
                document.getElementById('enMonth').value = currentCalMonth + 1; 
                document.getElementById('enDay').value = day; 
                calculateEnglishAge();
            };
            grid.appendChild(cell);
        }
    }

    // ရလဒ်ပြသပေးသည့် စမတ် ပေါ့အပ်စနစ်
    function showSmartPopup(years, months, days, infoText) {
        const modal = document.getElementById('ageModal'); const titleEl = document.getElementById('modalTitle'); const textEl = document.getElementById('modalText'); const buttonsEl = document.getElementById('modalButtons'); const boxEl = document.querySelector('.modal-box p');
        
        const selectedType = document.querySelector('input[name="appType"]:checked').value;
        let maxAgeLimit = (selectedType === 'old') ? 70 : 62; 
        let typeLabel = (selectedType === 'old') ? "သတ်မှတ်ချက် (၁၈ - ၇၀) နှစ်" : "သတ်မှတ်ချက် (၁၈ - ၆၂) နှစ်";
        let ageResultHtml = `<b>အသက်တွက်ချက်မှုရလဒ် [${typeLabel}] -</b><br>` + infoText + `<br>` + `• လက်ရှိအသက် - <b>${years} နှစ်၊ ${months} လ၊ ${days} ရက်</b>`;
        
        let isOverAge = false;
        if (years > maxAgeLimit || (years === maxAgeLimit && (months > 0 || days > 0))) {
            isOverAge = true;
        }

        if (years >= 18 && !isOverAge) {
            titleEl.className = "status-pass"; titleEl.innerHTML = "အောင်မြင်ပါသည်"; boxEl.style.borderLeftColor = "#28a745";
            textEl.innerHTML = ageResultHtml + `<hr style="border:0; border-top:1px dashed #ddd; margin:12px 0;"><span style="color:#1e3a8a; font-weight:bold;">MCIX သို့ သွားမည်လား (Password အလိုအလျောက် Copy ကူးပေးမည်)</span>`;
            buttonsEl.innerHTML = `<button class="modal-btn btn-yes" onclick="handlePopupChoice(true)">Yes (သွားမည်)</button><button class="modal-btn btn-no" onclick="handlePopupChoice(false)">No (မသွားပါ)</button>`;
        } else {
            titleEl.className = "status-fail"; boxEl.style.borderLeftColor = "#dc3545";
            if (isOverAge) { titleEl.innerHTML = `အသက်ကျော်လွန်နေပါသည် (အသက် ${maxAgeLimit} နှစ်ထက်ကျော်နေပါသည်)`; } 
            else { titleEl.innerHTML = "အသက်မပြည့်သေးပါ (အသက် ၁၈ နှစ်အောက်ဖြစ်နေပါသည်)"; }
            textEl.innerHTML = ageResultHtml + `<hr style="border:0; border-top:1px dashed #ddd; margin:12px 0;"><span style="color:#dc3545; font-weight:bold;">စည်းကမ်းချက်နှင့် မကိုက်ညီပါ (အသက် ၁၈ မှ ${maxAgeLimit} အတွင်းသာ ဖြစ်ရပါမည်)</span>`;
            buttonsEl.innerHTML = `<button class="modal-btn btn-ok" onclick="handlePopupChoice(false)">OK (သိပါပြီ)</button>`;
        }
        modal.style.display = 'flex';
    }

    function handlePopupChoice(goToMcix) { 
        document.getElementById('ageModal').style.display = 'none'; 
        if (goToMcix) { 
            navigator.clipboard.writeText(MCIX_PASSWORD).then(() => {
                alert("MCIX စကားဝှက်ကို Copy ကူးပြီးပါပြီ။ Login Box တွင် Paste ချပေးပါဗျာ။");
                window.open("https://live.mcixportal.com/login", "_blank"); 
            }).catch(err => { window.open("https://live.mcixportal.com/login", "_blank"); });
        } 
    }

    function switchTab(tabId, btn, isMm) {
        document.querySelectorAll('.calculator-form').forEach(form => form.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(tBtn => { tBtn.classList.remove('active'); tBtn.classList.remove('mm-active'); });
        document.getElementById(tabId).classList.add('active'); btn.classList.add('active'); if(isMm) btn.classList.add('mm-active');
    }

    function getCurrentMyanmarDate() {
        const today = new Date(); const currentDate = today.getDate();
        let mmYear = 1388; let mmMonth = 6; let moonPhase = (currentDate > 15) ? 2 : 1; let mmDay = currentDate % 15; if (mmDay === 0) mmDay = 15;
        return { year: mmYear, month: mmMonth, phase: moonPhase, day: mmDay };
    }

    function calculateEnglishAge() {
        const year = parseInt(document.getElementById('enYear').value); const month = parseInt(document.getElementById('enMonth').value); const day = parseInt(document.getElementById('enDay').value);
        if (!year || !day || isNaN(month)) { alert("ကျေးဇူးပြု၍ မွေးသက္ကရာဇ် အပြည့်အစုံ ဖြည့်စွက်ပေးပါဗျာ။"); return; }
        const dob = new Date(year, month - 1, day); const today = new Date(); if (dob > today) { alert("မွေးသက္ကရာဇ်သည် ယနေ့ထက် ကြီးနေ၍ မရပါဗျာ။"); return; }
        let years = today.getFullYear() - dob.getFullYear(); let months = today.getMonth() - dob.getMonth(); let days = today.getDate() - dob.getDate();
        if (days < 0) { months--; const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0); days += previousMonth.getDate(); }
        if (months < 0) { years--; months += 12; }
        const monthText = document.getElementById('enMonth').options[month-1].text;
        let infoText = `• မွေးသက္ကရာဇ် - <b>${year} ခုနှစ်၊ ${monthText}၊ ${day} ရက်</b>`;
        showSmartPopup(years, months, days, infoText);
    }

    function calculateMyanmarAge() {
        const birthYear = parseInt(document.getElementById('mmYear').value); const birthMonth = parseInt(document.getElementById('mmMonth').value); const birthPhase = parseInt(document.getElementById('moonPhase').value); const birthDay = parseInt(document.getElementById('mmDay').value);
        if (!birthYear || !birthDay) { alert("ကျေးဇူးပြု၍ မွေးသက္ကရာဇ် အပြည့်အစုံ ဖြည့်စွက်ပေးပါဗျာ။"); return; }
        const current = getCurrentMyanmarDate(); if (birthYear > current.year) { alert("မွေးသက္ကရာဇ်သည် ယနေ့ထက် ကြီးနေ၍ မရပါဗျာ။"); return; }
        let years = current.year - birthYear; let months = current.month - birthMonth; let days = current.day - birthDay;
        if (days < 0) { months--; days += 15; } if (months < 0) { years--; months += 12; }
        if (birthYear === 1326 && years < 62) { years = 62; }
        const monthText = document.getElementById('mmMonth').options[birthMonth-1].text; const phaseText = (birthPhase === 1 ? 'လဆန်း' : 'လဆုတ်');
        let infoText = `• မွေးသက္ကရာဇ် - <b>မြန်မာသက္ကရာဇ် ${birthYear} ခု၊ ${monthText} ${phaseText} ${birthDay} ရက်</b><br>• ယနေ့သက္ကရာဇ် - <b>မြန်မာသက္ကရာဇ် ${current.year} ခု</b>`;
        showSmartPopup(years, months, days, infoText);
    }
