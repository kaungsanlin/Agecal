<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator with Device Lock</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Pyidaungsu', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* 🔐 ၁။ Lock Screen ဒီဇိုင်း */
        .lock-container {
            background-color: #ffffff;
            color: #333333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .lock-container h2 {
            margin-top: 0;
            color: #222222;
        }
        .device-id-text {
            font-size: 16px;
            color: #555555;
            margin: 15px 0;
        }
        .device-id-highlight {
            color: #3b82f6;
            font-weight: bold;
            font-size: 18px;
        }
        .warning-text {
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        /* 📱 ၂။ Age Calculator ဒီဇိုင်း */
        .calculator-container {
            display: none; /* ပထမတွင် ဖျောက်ထားမည် */
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            border: 1px solid #333333;
        }
        .calculator-container h2 {
            text-align: center;
            color: #3b82f6;
            margin-top: 0;
        }
        
        /* ဘုံသုံး Input နှင့် Button စတိုင်များ */
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #444444;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Pyidaungsu', sans-serif;
        }
        .lock-container input[type="text"] {
            border: 1px solid #cccccc;
            background-color: #f9f9f9;
            color: #333333;
        }
        .calculator-container input[type="date"] {
            background-color: #2a2a2a;
            color: #ffffff;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-family: 'Pyidaungsu', sans-serif;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2563eb;
        }
        
        /* ရလဒ်ပြသသည့်နေရာ */
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #2a2a2a;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            border-left: 5px solid #3b82f6;
            display: none;
        }
    </style>
</head>
<body>

    <div id="lockScreen" class="lock-container">
        <h2>🔒 Device Lock စနစ်</h2>
        <p class="device-id-text">သင့်ဖုန်း၏ Device ID: <span id="displayDeviceID" class="device-id-highlight">KSL-0000</span> ဖြစ်ပါသည်။</p>
        <p class="warning-text">(အစ်ကို့ထံမှ ဤ Device ID အတွက် သီးသန့် Key တောင်းယူပြီး ရိုက်ထည့်ပါ)</p>
        
        <input type="text" id="activationKeyInput" placeholder="Activation Key ကို ရိုက်ထည့်ပါ">
        <button onclick="validateAccess()">စစ်ဆေးပြီး အကောင့်ဝင်မည်</button>
    </div>

    <div id="calculatorApp" class="calculator-container">
        <h2>📅 Age Calculator</h2>
        <p style="text-align: center; color: #aaa; margin-bottom: 20px;">မွေးသက္ကရာဇ်ကို ရွေးချယ်ပြီး အသက်တွက်ချက်ပါဗျာ။</p>
        
        <label for="birthDate" style="display:block; margin-bottom:8px; color:#ddd;">မွေးနေ့ရွေးပါ -</label>
        <input type="date" id="birthDate">
        
        <button onclick="calculateAge()">အသက်တွက်မည်</button>
        
        <div id="result" class="result-box"></div>
    </div>

    <script>
        // ⚠️ အရေးကြီးဆုံးအဆင့် - Google Sheet ထဲက Apps Script ကရလာတဲ့ Web App URL ကို ဒီမှာ အစားထိုးထည့်ပါ
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwYpZ7Xr3E_-0g0Ayn0TMpiSmKqRD_LfYXZzDsta6mDC3d2zn4J6a5Lb16IVd53j08qsQ/exec";

        // ==========================================
        // 🔐 [A] DEVICE LOCK စနစ်ဆိုင်ရာ JAVASCRIPT
        // ==========================================
        
        function getDeviceID() {
            let deviceId = localStorage.getItem("ksl_device_id");
            if (!deviceId) {
                let randomId = Math.floor(1000 + Math.random() * 9000);
                deviceId = "KSL-" + randomId;
                localStorage.setItem("ksl_device_id", deviceId);
            }
            return deviceId;
        }

        window.onload = function() {
            document.getElementById("displayDeviceID").innerText = getDeviceID();
            
            // ယခင်က Key မှန်အောင်ရိုက်ဖူးရင် calculatorApp ကို တန်းဖွင့်ပေးမယ်
            if (localStorage.getItem("ksl_device_activated") === "true") {
                enterMainApp();
            }
        };

        function validateAccess() {
            const inputKey = document.getElementById('activationKeyInput').value.trim();
            const currentDeviceId = getDeviceID();
            
            if (!inputKey) {
                alert("ကျေးဇူးပြု၍ Activation Key ရိုက်ထည့်ပေးပါဗျာ။");
                return;
            }

            if (WEB_APP_URL.includes("အစ်ကို့ရဲ့_Google_Apps_Script")) {
                alert("⚠️ သတိပေးချက်: WEB_APP_URL ထည့်ရန် ကျန်နေပါသေးသည်ဗျာ။");
                return;
            }

            fetch(`${WEB_APP_URL}?key=${encodeURIComponent(inputKey)}&deviceId=${encodeURIComponent(currentDeviceId)}&action=check`)
            .then(res => res.json())
            .then(response => {
                if (response.status === "invalid") {
                    alert("❌ ဤ Key သည် စနစ်ထဲတွင် မရှိပါ သို့မဟုတ် မှားယွင်းနေပါသည်။");
                } 
                else if (response.status === "used") {
                    alert("❌ ဤ Key သည် အခြားဖုန်းတစ်ခုတွင် Lock ကျသွားပြီဖြစ်၍ သုံးမရတော့ပါ။");
                } 
                else if (response.status === "activated") {
                    localStorage.setItem("ksl_used_key", inputKey);
                    localStorage.setItem("ksl_device_activated", "true");
                    alert("🎉 Key အောင်မြင်စွာ တွဲဆက်ပြီးပါပြီ။ Google Sheet တွင် Log တက်လာပါပြီ။");
                    enterMainApp();
                } 
                else if (response.status === "matched") {
                    localStorage.setItem("ksl_used_key", inputKey);
                    localStorage.setItem("ksl_device_activated", "true");
                    enterMainApp();
                }
            })
            .catch(err => {
                console.error(err);
                alert("အင်တာနက်လိုင်း သို့မဟုတ် Apps Script URL စစ်ဆေးပေးပါဗျာ။");
            });
        }

        function enterMainApp() {
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("calculatorApp").style.display = "block";
        }

        // ==========================================
        // 📅 [B] AGE CALCULATOR ဆိုင်ရာ JAVASCRIPT
        // ==========================================
        
        function calculateAge() {
            const birthDateInput = document.getElementById("birthDate").value;
            if (!birthDateInput) {
                alert("ကျေးဇူးပြု၍ မွေးသက္ကရာဇ် ရွေးချယ်ပေးပါဗျာ။");
                return;
            }
            
            const birthDate = new Date(birthDateInput);
            const today = new Date();
            
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();
            
            // နေ့ရက်များ နှုတ်လို့မလောက်လျှင် ပြန်ညှိခြင်း
            if (days < 0) {
                months--;
                // ပြီးခဲ့တဲ့လရဲ့ နောက်ဆုံးရက်ကို ယူခြင်း
                const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += previousMonth.getDate();
            }
            
            // လများ နှုတ်လို့မလောက်လျှင် ပြန်ညှိခြင်း
            if (months < 0) {
                years--;
                months += 12;
            }
            
            // ရလဒ်ထုတ်ပြခြင်း
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `
                <span style="color:#3b82f6; font-weight:bold;">သင့်အသက်ရလဒ်မှာ -</span><br>
                👶 <b>${years}</b> နှစ်၊ 
                🌙 <b>${months}</b> လ၊ 
                📅 <b>${days}</b> ရက် ဖြစ်ပါတယ်ဗျာ။
            `;
        }
    </script>
</body>
</html>
